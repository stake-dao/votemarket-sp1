# Docker Compose for SP1 Circuit Compilation
# Ensures reproducible VKEY generation matching CI environment

services:
  sp1:
    # Force x86_64 platform for reproducible VKEY generation across architectures
    platform: linux/amd64
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - path: ../script/.env
        required: false
    volumes:
      # Mount source code (parent directory)
      - ..:/workspace
      # Named volumes for caching
      - cargo-registry:/home/ubuntu/.cargo/registry
      - cargo-git:/home/ubuntu/.cargo/git
      - target-cache:/workspace/target
      - sp1-cache:/home/ubuntu/.sp1
    environment:
      - CARGO_HOME=/home/ubuntu/.cargo
      - RUST_BACKTRACE=1
      - NETWORK_PRIVATE_KEY
      - ETHEREUM_MAINNET_RPC_URL
    stdin_open: true
    tty: true

volumes:
  cargo-registry:
  cargo-git:
  target-cache:
  sp1-cache:
